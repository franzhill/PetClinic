

moxtures:

  - name: BeforeAll
    moxtures: 
      - create_species_dog
      - create_species_cat
      - create_species_dragon


  - name: AfterAll
    moxtures: []


  - name: BeforeEach
    moxtures: []


  - name: AfterEach
    moxtures: []



  - name: create_species_dog
    endpoint: "/api/species"
    method: POST
    lax: true         # Ignores errors if 'Dog' already exists
    body: |           # Literal Block Scalar operator. Preserves every single newline and space exactly as you typed it.
      { "name": "Dog",
        "expectedLifespan": 12,
        "avgLitterSize": 4,
        "fertilityAgeWindow": {
          "from": 1,
          "to": 8
        }
      }
    expect:
      status: 201       # 2xx    also accepted



  - name: create_species_cat
    extends: create_species_dog
    body: |                         # full override
      { "name": "Cat",
        "expectedLifespan": 18,
        "avgLitterSize": 5,
        "fertilityAgeWindow": {
          "from": 1,
          "to": 10
        }
      }


  - name: create_species_dragon
    extends: create_species_dog
    body: |
      { "name": "Dragon",
        "expectedLifespan": 250,
        "avgLitterSize": 7,
        "fertilityAgeWindow": {
          "from": 18,
          "to": 100
        }
      }



  - name: create_owner
    endpoint: "/owners"
    method: POST
    body: |
      { "name": "Tintin"
      }
    save:
      ownerId: "$.id"
    expect:
      status: 201



  - name: create_pet_for_owner
    endpoint: "/api/pets"
    method: POST
    vars:
      in_name     : "Snowy"
      in_sex      :  "MALE"
      in_birthDate: "2020-01-01"
      in_species  : "Dog"
    body: |
      {
        "name": {{in_name}},             # No quotes needed (works with too: "{{in_name}}")
        "sex": {{in_sex}},
        "birthDate": {{in_birthDate}},
        "species": {
          "name": {{in_species}}
        },
        "owner": {
          "id": {{ownerId}}
        }
      }
    save:
      petId: "$.id"
      petName: "$.name"
      petOwnerId: "$.owner.id"
    expect:
      status: 201


  - name: create_pet_for_owner_with_expect_body_match
    extends: create_pet_for_owner     # alias for 'basedOn'
    expect:
      body: 
        match: 
          mode: partial   # partial | full
          #schema: "classpath:schemas/pet.json"  #schema checks the structure and data types of your response.
          #ignorePaths: ["$.createdAt"]
          content: |
            {
              "name": {{in_name}},
              "sex": {{in_sex}},
              "birthDate": "{{in_birthDate}}",
              "species": {
                "name": "{{in_species}}"
              },
              "owner": {
                "id": {{ownerId}}
              }
            }


  - name: create_pet_for_owner_with_expect_body_assert
    extends: create_pet_for_owner     # alias for 'basedOn'
    expect:
      body: 
        assert:
          # String assertions (quotes mandatory here)
          "$.name": "{{in_name}}"
          "$.sex": "{{in_sex}}"
          "$.species.name": "{{in_species}}"

          # Numeric/ID assertions
          "$.owner.id": "{{ownerId}}"
          
          # Checking a specific nested field without needing the full object tree
          "$.birthDate": "{{in_birthDate}}"


  - name: create_pet_for_owner_with_body_partial_override_yaml
    extends: create_pet_for_owner
    body:
      species:
        name: "Dragon" # This should deep-merge into the parent 'species' object


  - name: create_pet_for_owner_with_body_partial_override_json
    extends: create_pet_for_owner
    body: |
      {
        "species": {
          "name": "Dragon"
        }
      }



  - name: group_create_owner_and_pet
    moxtures: 
      - create_owner
      - create_pet_for_owner


  - name: group_create_owner_and_pet_with_local_override
    vars:
      in_name: "Beethoven"   # overrides 'Snowy'
    moxtures: 
      - create_owner
      - create_pet_for_owner


  - name: group_create_owner_and_pet_with_expect_section
    vars:
      in_name: "Pongo"   # overrides 'Snowy'
    moxtures: 
      - create_owner
      - create_pet_for_owner_with_expect_section



  - name: delete_pet
    method: DELETE
    endpoint: /pet/{{petId_local}}/delete
    expect:
      status: 200





  - name: verify_owner_pets
    endpoint: "/owners/{{ownerId}}/pets"
    method: GET
    expect:
      status: 200
