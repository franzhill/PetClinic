



moxtures:















  - name: create_account
    method: POST
    endpoint: /pet/{{petId_1}}/account # petId_1 is created in the BeforeAll fixture
    expectedStatus: 201
    # body as raw JSON string body (engine parses it)
    body: >
         {  "characteristic": "A",
         }
    save:
      # save the id in this specified variable.
      # Variables are global and can be reused in this fixture file through
      # the following syntax:
      #    {{name_of_my_variable}}
      # They can also be retrieved in the java test code via: 
      #   XXXX

      offer1Id: $.id



  - name: create-account-2
    baseOn: create-account
    save: 
      offer2Id: $.id



  - name: create-offer-3
    # basedOn merge rules:
    # - method, endpoint, expectedStatus: child overrides if present.
    # - headers, query, save: map merge, child keys override parent keys.
    # - body: deep-merge objects, replace arrays. Child overrides when conflict.
    # If parent name not found → fail fast with the layer/file path in the error.
    basedOn: create-account
    # Differential body: only specify what differs from basedOn's body.
    body: >
        {   "characteristic": "B"
        }
    save: 
      offer3Id: $.id



  # ----------------------------------------------------------------
  # Examples
  # ----------------------------------------------------------------

  - name: example-yaml
    method: POST
    endpoint: /example
    expectedStatus: 201
    # body as pure YAML
    body:
      characteristic1: A
      characteristic2: B

  - name: example-inline-json
    method: POST
    endpoint: /example
    expectedStatus: 201
    # body as inline
    body: {"characteristic1":"A","characteristic2":"B"}

  - name: example-text-json
    method: POST
    endpoint: /example
    expectedStatus: 201
    # body as raw JSON string body (engine parses it)
    body: >
      {"characteristic1":"A","characteristic2":"B"}

  - name: example-from-file
    method: POST
    endpoint: /example
    expectedStatus: 201
    # body as external file, either .json or .yaml
    body: classpath:bodys/example.json   # or .yaml

