  # ==================================================================
  #
  # This file exposes moxtures available 
  # to the JUnit test classes/moxtures at the same level or under, 
  # in the package hierarchy.
  #
  # ==================================================================


moxtures:

  - name: BeforeAll
    moxtures: 
      - create_species_dog
      - create_species_cat
      - create_species_dragon
      - create_species_dog   # should not fail if has failOnError=false

  - name: AfterAll
    moxtures: []


  - name: BeforeEach
    moxtures: []


  - name: AfterEach
    moxtures: []



  - name: create_species_dog
    extends: create_species
    body: |           # Literal Block Scalar operator. Preserves every single newline and space exactly as you typed it.
      { "name": "Dog",
        "expectedLifespan": 12,
        "avgLitterSize": 4,
        "fertilityAgeWindow": {
          "from": 1,
          "to": 8
        }
      }
    expect:
      failOnError: false  # Ignores errors if 'Dog' already exists
                          # Replaces deprecated 'lax: true'



  - name: create_species_cat
    extends: create_species
    body: |
      { "name": "Cat",
        "expectedLifespan": 18,
        "avgLitterSize": 5,
        "fertilityAgeWindow": {
          "from": 1,
          "to": 10
        }
      }
    expect:
      failOnError: false



  - name: create_species_dragon
    extends: create_species
    body: |
      { "name": "Dragon",
        "expectedLifespan": 250,
        "avgLitterSize": 7,
        "fertilityAgeWindow": {
          "from": 18,
          "to": 100
        }
      }
    expect:
      failOnError: false


  - name: create_species_dragon_with_error
    extends: create_species
    options:
      allowFailure: true   # => the error should not fail the test
    body: |
      { "name": "Dragon",
        "expectedLifespan": 1000,   # this is too high, should be rejected by the service
        "avgLitterSize": 7,
        "fertilityAgeWindow": {
          "from": 18,
          "to": 100
        }
      }




  - name: create_pet_for_owner_with_expect_body_match
    extends: create_pet_for_owner     # alias for 'basedOn'
    expect:
      body: 
        match: 
          mode: partial   # partial | full
          #schema: "classpath:schemas/pet.json"  #schema checks the structure and data types of your response.
          #ignorePaths: ["$.createdAt"]
          content: |
            {
              "name": {{in.name}},
              "sex": {{in.sex}},
              "birthDate": "{{in.birthDate}}",
              "species": {
                "name": "{{in.species}}"
              },
              "owner": {
                "id": {{ownerId}}
              }
            }



  - name: create_pet_for_owner_with_expect_body_assert
    extends: create_pet_for_owner     # alias for 'basedOn'
    expect:
      body: 
        assert:
          # String assertions (quotes mandatory here)
          "$.name": "{{in.name}}"
          "$.sex": "{{in.sex}}"
          "$.species.name": "{{in.species}}"

          # Numeric/ID assertions
          "$.owner.id": "{{ownerId}}"
          
          # Checking a specific nested field without needing the full object tree
          "$.birthDate": "{{in.birthDate}}"



  - name: create_pet_for_owner_with_body_partial_override_yaml
    extends: create_pet_for_owner
    body:
      species:
        name: "Dragon" # This should deep-merge into the parent 'species' object



  - name: create_pet_for_owner_with_body_partial_override_json
    extends: create_pet_for_owner
    body: |
      {
        "species": {
          "name": "Dragon"
        }
      }



  - name: group_create_owner_and_pet
    moxtures: 
      - create_owner
      - create_pet_for_owner



  - name: group_create_owner_and_pet_with_local_override
    vars:
      in.name: "Beethoven"   # overrides 'Snowy'
    moxtures: 
      - create_owner
      - create_pet_for_owner



  - name: group_create_owner_and_pet_with_expect_section
    vars:
      in.name: "Pongo"   # overrides 'Snowy'
    moxtures: 
      - create_owner
      - create_pet_for_owner_with_expect_section





